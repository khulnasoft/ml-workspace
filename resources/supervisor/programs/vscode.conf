[program:vscode]
command=/usr/local/bin/code-server --socket=/var/run/vscode.sock --auth=password --disable-update-check --disable-telemetry --user-data-dir=%(ENV_HOME)s/.config/Code/ --extensions-dir=%(ENV_HOME)s/.vscode/extensions/ %(ENV_WORKSPACE_HOME)s/
environment=PASSWORD="%(ENV_WORKSPACE_INTERNAL_AUTH_TOKEN)s"
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/var/log/supervisor/%(program_name)s.log ; log logs into file
startretries=5   ; max # of serial start failures (default 3)
